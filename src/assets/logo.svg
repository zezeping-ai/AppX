<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="AppX logo">
  <defs>
    <linearGradient id="bg" x1="16" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="40" y1="28" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#312E81" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#shine)"/>

  <!-- window chrome -->
  <rect x="28" y="30" width="72" height="68" rx="12" fill="#FFFFFF" fill-opacity="0.14"/>
  <circle cx="40" cy="42" r="3.2" fill="#FCA5A5"/>
  <circle cx="52" cy="42" r="3.2" fill="#FDE68A"/>
  <circle cx="64" cy="42" r="3.2" fill="#86EFAC"/>

  <!-- stylized X -->
  <path
    d="M46 58 L64 82 L82 58"
    stroke="#FFFFFF"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M46 82 L64 58 L82 82"
    stroke="#FFFFFF"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.92"
  />

  <!-- accent dot -->
  <circle cx="92" cy="36" r="5" fill="#22D3EE"/>
</svg>
