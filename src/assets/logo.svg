<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="AppX">
  <defs>
    <linearGradient id="appx-bg" x1="16" y1="8" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="55%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="26" fill="url(#appx-bg)" />

  <!-- window chrome: subtle nod to desktop app identity -->
  <circle cx="28" cy="28" r="3" fill="#FCA5A5" />
  <circle cx="40" cy="28" r="3" fill="#FDE68A" />
  <circle cx="52" cy="28" r="3" fill="#86EFAC" />

  <!-- App: narrower than Ctp, slightly smaller to avoid overlapping X badge -->
  <text
    x="18"
    y="80"
    font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="33"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-0.5"
  >App</text>

  <!-- X badge: high contrast, easy to read at small sizes -->
  <rect x="90" y="38" width="34" height="34" rx="9" fill="#ffffff" />
  <text
    x="107"
    y="64"
    text-anchor="middle"
    font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="26"
    font-weight="800"
    fill="#4F46E5"
  >X</text>
</svg>
